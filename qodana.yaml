#################################################################################
#              WARNING: Do not store sensitive information in this file,        #
#               as its contents will be included in the Qodana report.          #
#################################################################################
version: "1.0"

linter: jetbrains/qodana-js-community:2025.3

bootstrap: npm ci

exclude:
  - name: All
    paths:
      - dist
      - node_modules
      - .astro

failureConditions:
  severityThresholds:
    critical: 0
